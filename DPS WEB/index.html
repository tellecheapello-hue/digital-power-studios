<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Digital Power Studios — Convertimos negocios en potencias digitales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script>
window.TWEAKS = {
  "accent": "violet",
  "particles": true,
  "darkHero": true
};
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Common.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Services.jsx"></script>
<script type="text/babel" src="components/Bottom.jsx"></script>

<script type="text/babel">
function TweaksPanel({ open, tweaks, onChange }) {
  const accents = [
    { id:'violet', a:'#2C41C9', b:'#6D5BFF' },
    { id:'cyan',   a:'#0EA5E9', b:'#22D3EE' },
    { id:'magenta',a:'#C026D3', b:'#F472B6' },
    { id:'emerald',a:'#059669', b:'#10B981' },
  ];
  React.useEffect(()=>{
    const found = accents.find(a => a.id === tweaks.accent) || accents[0];
    document.documentElement.style.setProperty('--c-primary', found.a);
    document.documentElement.style.setProperty('--c-accent', found.b);
  },[tweaks.accent]);
  return (
    <div className={`tweaks-panel${open?' open':''}`}>
      <h4>Tweaks</h4>
      <div className="tweak-row">
        <label>Color de acento</label>
        <div className="swatches">
          {accents.map(a=>(
            <span key={a.id} className={`swatch${tweaks.accent===a.id?' active':''}`}
              style={{background:`linear-gradient(135deg,${a.a},${a.b})`}}
              onClick={()=>onChange({accent:a.id})}/>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label className="tweak-toggle">
          <input type="checkbox" checked={tweaks.darkHero} onChange={e=>onChange({darkHero:e.target.checked})}/>
          Hero oscuro
        </label>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(window.TWEAKS);
  const [editOpen, setEditOpen] = React.useState(false);
  const [modalOpen, setModalOpen] = React.useState(false);

  React.useEffect(()=>{
    const onMsg = (e)=>{
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setEditOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', onMsg);
  },[]);

  React.useEffect(()=>{
    const open = ()=> setModalOpen(true);
    window.addEventListener('openContactModal', open);
    return ()=>window.removeEventListener('openContactModal', open);
  },[]);

  const update = (edits)=>{
    setTweaks(t => {
      const next = {...t, ...edits};
      window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*');
      return next;
    });
  };

  React.useEffect(()=>{
    document.body.classList.toggle('light-hero', !tweaks.darkHero);
  },[tweaks]);

  return (
    <>
      <Nav dark={tweaks.darkHero}/>
      <Hero/>
      <ValueProps/>
      <Services/>
      <Process/>
      <Benefits/>
      <Pricing/>
      <FAQ/>
      <CTAFinal/>
      <Footer/>
      <TweaksPanel open={editOpen} tweaks={tweaks} onChange={update}/>
      <ContactModal open={modalOpen} onClose={()=>setModalOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
